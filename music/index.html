<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aswin.db/music</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="site-logo">
                <span class="logo-main">aswin.db</span><span class="logo-slash">/</span><span class="logo-accent">music</span>
            </div>
            <p class="subtitle">
                Explore data through the years:
                <a href="year.html" class="year-link" id="yearRange">2011 – 2025</a>
            </p>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-value">-</div>
                <div class="stat-label">Total Listens</div>
            </div>
            <a href="top-artists.html" class="stat-card">
                <div class="stat-value">-</div>
                <div class="stat-label">Artists</div>
            </a>
            <a href="top-albums.html" class="stat-card">
                <div class="stat-value">-</div>
                <div class="stat-label">Releases</div>
            </a>
            <a href="top-tracks.html" class="stat-card">
                <div class="stat-value">-</div>
                <div class="stat-label">Tracks</div>
            </a>
        </div>

        <div class="search-section">
            <div class="search-col">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search artists..."
                    autocomplete="off"
                >
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="search-col">
                <input
                    type="text"
                    id="releaseSearchInput"
                    class="search-input"
                    placeholder="Search releases..."
                    autocomplete="off"
                >
                <div id="releaseSearchResults" class="search-results"></div>
            </div>
        </div>

        <footer>
            <p>Powered by <a href="https://github.com/sql-js/sql.js" target="_blank">sql.js</a></p>
        </footer>

        <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <i data-lucide="sun"></i>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="app.js"></script>
</body>
</html>

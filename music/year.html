<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aswin.db/music</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="theme.js"></script>
</head>
<body>
    <div class="container">
        <div class="site-header">
            <a href="index.html" class="site-logo-small">
                <span class="logo-main">aswin.db</span><span class="logo-slash">/</span><span class="logo-accent">music</span>
            </a>
            <a href="index.html" class="back-button">← Home</a>
        </div>

        <header>
            <div class="year-navigation">
                <button id="prevYear" class="year-nav-arrow" aria-label="Previous year">←</button>
                <h1 id="pageTitle">
                    <select id="yearSelect" class="year-select-hero">
                        <!-- Populated by JS -->
                    </select>
                </h1>
                <button id="nextYear" class="year-nav-arrow" aria-label="Next year">→</button>
            </div>
            <p class="subtitle" id="yearSummary">Loading...</p>
        </header>

        <div class="page-controls">
            <div class="control-block">
                <span class="control-block-label">Sort By</span>
                <div class="sort-controls">
                    <button class="sort-btn active" data-sort="listens" title="Sort by listens"><i data-lucide="headphones"></i></button>
                    <button class="sort-btn" data-sort="minutes" title="Sort by minutes"><i data-lucide="clock"></i></button>
                </div>
            </div>
            <div class="control-block">
                <span class="control-block-label">#</span>
                <div class="sort-controls">
                    <button class="sort-btn active" data-count="10">10</button>
                    <button class="sort-btn" data-count="20">20</button>
                    <button class="sort-btn" data-count="50">50</button>
                    <button class="sort-btn" data-count="100">100</button>
                </div>
            </div>
            <div class="control-block">
                <span class="control-block-label">Display</span>
                <div class="sort-controls">
                    <button class="sort-btn active" id="viewList" data-view="list" title="List"><i data-lucide="layout-list"></i></button>
                    <button class="sort-btn" id="viewTiles" data-view="tiles" title="Tiles"><i data-lucide="layout-grid"></i></button>
                    <button class="sort-btn" id="viewCollage" data-view="collage" title="Collage"><i data-lucide="grid-3x3"></i></button>
                </div>
            </div>
            <div class="control-block">
                <span class="control-block-label">Filter</span>
                <div class="sort-controls">
                    <button class="sort-btn active" data-filter="this-year">THIS YEAR</button>
                    <button class="sort-btn" data-filter="all-years">ALL YEARS</button>
                </div>
            </div>
        </div>

        <section class="year-section">
            <h2>Releases</h2>
            <div id="releasesContainer" class="image-grid">
                <div class="loading">Loading releases...</div>
            </div>
        </section>

        <section class="year-section">
            <h2>Artists</h2>
            <div id="artistsContainer" class="image-grid">
                <div class="loading">Loading artists...</div>
            </div>
        </section>

        <footer>
            <p>Powered by <a href="https://github.com/sql-js/sql.js" target="_blank">sql.js</a></p>
        </footer>

        <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
            <i data-lucide="sun"></i>
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="year.js"></script>
</body>
</html>
